<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.data.customization.title | default: site.data.defaults.title }}</title>
    <link rel="icon" type="image/png" href="{{ site.data.customization.favicon_path | default: site.data.defaults.favicon_path | relative_url }}">
    <link href="{{ site.data.customization.google_fonts_url | default: site.data.defaults.google_fonts_url }}" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}?v={{ site.time | date: '%Y%m%d%H%M%S' }}">

    <!-- Custom Color Overrides -->
    <style>
    :root {
        --primary-bg: {{ site.data.customization.colors.primary_bg | default: site.data.defaults.colors.primary_bg }};
        --secondary-bg: {{ site.data.customization.colors.secondary_bg | default: site.data.defaults.colors.secondary_bg }};
        --gh-border: {{ site.data.customization.colors.gh_border | default: site.data.defaults.colors.gh_border }};
        --gh-text: {{ site.data.customization.colors.gh_text | default: site.data.defaults.colors.gh_text }};
        --text-muted: {{ site.data.customization.colors.text_muted | default: site.data.defaults.colors.text_muted }};
        --accent-blue: {{ site.data.customization.colors.accent_blue | default: site.data.defaults.colors.accent_blue }};
        --accent-blue-hover: {{ site.data.customization.colors.accent_blue_hover | default: site.data.defaults.colors.accent_blue_hover }};
        --sw-yellow: {{ site.data.customization.colors.sw_yellow | default: site.data.defaults.colors.sw_yellow }};
        
        --body-font: {{ site.data.customization.body_font | default: site.data.defaults.body_font }};
        --header-font: {{ site.data.customization.header_font | default: site.data.defaults.header_font }};
        --logo-max-height: {{ site.data.customization.logo_max_height | default: site.data.defaults.logo_max_height }};
        --logo-max-height-mobile: {{ site.data.customization.logo_max_height_mobile | default: site.data.defaults.logo_max_height_mobile }};
    }
    </style> 

<style>
/* 1. BRANDING & SECRET SELECTOR */
.campaign-selector-wrapper { display: flex; align-items: center; position: relative; }
.nav-brand {
    font-family: 'Montserrat', sans-serif; font-weight: 700; text-transform: uppercase;
    color: var(--accent-blue) !important; text-decoration: none; transition: 0.3s;
}
.selector-container { position: relative; display: inline-flex; align-items: center; margin-left: 8px; }
#campaign-dropdown { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 2; }
.selector-arrow { color: var(--sw-yellow); font-size: 0.8rem; pointer-events: none; z-index: 1; transition: 0.2s; }

/* 2. HERO SECTION */
.hero-section {
    text-align: center; padding: 60px 20px; border-bottom: 1px solid var(--gh-border);
    background: radial-gradient(circle at center, rgba(13, 17, 23, 0.5) 0%, var(--primary-bg) 100%);
}
.site-logo { max-height: var(--logo-max-height); filter: drop-shadow(0 0 20px rgba(97, 218, 251, 0.15)); }
.flavor-text { color: var(--sw-yellow); font-style: italic; margin-top: 20px; font-family: monospace; font-size: 0.85rem; }

/* 3. FOOTER SPECIFIC STYLES */
.nsfw-toggle-container { margin-top: 20px; }
#nsfw-toggle-btn {
    background: transparent; border: 1px solid var(--gh-border); color: var(--text-muted);
    padding: 6px 12px; font-family: monospace; font-size: 0.75rem; cursor: pointer;
    transition: all 0.3s; border-radius: 4px; text-transform: uppercase;
}
#nsfw-toggle-btn:hover { border-color: var(--sw-yellow); color: var(--sw-yellow); }
#nsfw-toggle-btn.active { border-color: #ff4444; color: #ff4444; box-shadow: 0 0 10px rgba(255, 68, 68, 0.2); }

/* 4. DISCORD BADGE & FOOTER LINKS */
.footer-link-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 25px;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.discord-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: rgba(88, 101, 242, 0.1);
    border: 1px solid #5865F2;
    color: #5865F2 !important;
    border-radius: 4px;
    font-family: 'Montserrat', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s ease;
    text-decoration: none;
}

.discord-badge:hover {
    background: #5865F2;
    color: white !important;
    box-shadow: 0 0 15px rgba(88, 101, 242, 0.4);
    transform: translateY(-2px);
}

.discord-icon {
    width: 18px;
    height: 18px;
    fill: currentColor;
}

@media (max-width: 900px) {
    .hero-section { padding: 40px 15px; }
    .site-logo { max-height: var(--logo-max-height-mobile); }
}
</style>

{{ site.data.customization.custom_scripts }}
</head>
